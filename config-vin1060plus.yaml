xinput_name: 10moons-pen
vendor_id: 0x08f2
product_id: 0x6811
pen:
    max_x: 4096     #moving the tablet pen as far right as possible (use "swap_direction_x:true" to invert if needed)
    max_y: 4096     #moving the tablet pen as far down as possible (use "swap_direction_y:true" to invert if needed)
    resolution_x: 1
    resolution_y: 1
    max_pressure: 2048   # manual says 8192 but cheap chinese chip reports outputs much less values 2048
    pressure_min: 900  # when pressing the tablet pen as hard as functionally possible (yours may vary) 300
    pressure_contact_threshold: 600    # when making contact with the tablet surface (yours may vary) 550
    pressure_contact_threshold_up: 50  # change of pressure when releasing contact with the tablet surface (yours may vary)
actions:
    pen_touch:
        - BTN_LEFT
    pen: BTN_TOOL_PEN
    # 15.06.2026 comment: Anyway, currently mixed-mode devices (configured as mouse and tablet at once) do not work properly.
    # Previously it was possible to configure "pen_touch: -BTN_MOUSE" (or -BTN_LEFT) and "pen: BTN_TOOL_PEN" at once what gave 
    # effect of perfect mouse emulation and detection of pressure in Gimp and Krita.
    # Unfortunately, currently declaration "pen: BTN_TOOL_PEN" have strange behavior. It adds additional mouse button click&hold 
    # (BTN_LEFT=1 without contact between stylus tip and tablet surface) on xorg level when a stylus go into tablet radius. 
    # You will feel it as very annoying behavior. 
    # So, if you will work with this device just as mouse or pointer, comment out "pen: BTN_TOOL_PEN" declaration in config file. 
    # Gimp and Krita will work, however without stylus tip pressure detection. It looks like it is not our driver but xorg behavior.
    pen_buttons:
    # https://sites.uclouvain.be/SystInfo/usr/include/linux/input.h.html
    # https://github.com/torvalds/linux/blob/master/include/uapi/linux/input-event-codes.h
    #for Buttons :: python -c "from evdev import ecodes; print([x for x in dir(ecodes) if 'BTN_' in x])"
        #- BTN_STYLUS                  #1st button closest to tip
        - BTN_MIDDLE                  #1st button as middle mouse button
        #- BTN_STYLUS2                 #2nd button as stylus2
        - BTN_RIGHT                   #2nd button as right mouse button
    tablet_buttons: 
    #for Keys :: python -c "from evdev import ecodes; print([x for x in dir(ecodes) if 'KEY_' in x])"
        - KEY_E                         #labelled 'E'
        - KEY_B                         #labelled 'B'
        - KEY_LEFTCTRL+KEY_KPPLUS       #labelled 'CTRL -'
        - KEY_LEFTCTRL+KEY_KPMINUS      #labelled 'CTRL +'
        - KEY_LEFTBRACE                 #labelled '['
        - KEY_RIGHTBRACE                #labelled ']'
        - KEY_SCROLLUP                  #labelled 'Mouse Icon arrow UP'
        - KEY_TAB                       #labelled 'TAB'
        - KEY_SCROLLDOWN                #labelled 'Mouse Icon arrow DOWN'
        - KEY_SPACE                     #labelled 'SPACE'
        - KEY_LEFTCTRL                  #labelled 'CTRL'
        - KEY_LEFTALT                   #labelled 'ALT'

        - KEY_MUTE                      #up mute
        - KEY_VOLUMEDOWN                #up vol-
        - KEY_VOLUMEUP                  #up vol+
        - KEY_SOUND                     #up note
        - KEY_PLAYPAUSE                 #up play/pause
        - KEY_PREVIOUSSONG              #up back
        - KEY_NEXTSONG                  #up next
        - KEY_WWW                       #up Home
        - KEY_CALC                      #up calc
        - KEY_BUTTONCONFIG              #up desktop
settings:
    swap_axis: false
    swap_direction_x: false
    swap_direction_y: false
